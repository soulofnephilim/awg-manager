name: "CI"
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check generated API schemas are fresh
        # schemas.gen.ts генерируется из internal/openapi/swagger.yaml; правка
        # спеки без перегенерации молча ослабляет runtime-валидацию.
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run gen:api
          git diff --exit-code -- src/lib/api/schemas.gen.ts || {
            echo "::error::src/lib/api/schemas.gen.ts устарел — запустите 'npm run gen:api' и закоммитьте результат"
            exit 1
          }

      - name: svelte-check
        working-directory: frontend
        run: npm run check -- --threshold warning

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: vitest
        working-directory: frontend
        run: npm test

name: "CI"
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swagger:
    name: Swagger drift
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Check swagger.yaml is fresh
        # swagger.yaml генерируется swaggo из Go-аннотаций; правка аннотаций
        # без перегенерации рассинхронизирует спеку с кодом — из этого класса
        # был #520 (schemas.gen.ts проверяется ниже, но он «свежий» лишь
        # относительно swagger.yaml — первое звено цепочки защищаем здесь).
        run: |
          set -euo pipefail
          go generate ./cmd/awg-manager
          git diff --exit-code -- internal/openapi/swagger.yaml || {
            echo "::error::internal/openapi/swagger.yaml устарел — запустите 'go generate ./cmd/awg-manager' и закоммитьте результат"
            exit 1
          }

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check generated API schemas are fresh
        # schemas.gen.ts генерируется из internal/openapi/swagger.yaml; правка
        # спеки без перегенерации молча ослабляет runtime-валидацию.
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run gen:api
          git diff --exit-code -- src/lib/api/schemas.gen.ts || {
            echo "::error::src/lib/api/schemas.gen.ts устарел — запустите 'npm run gen:api' и закоммитьте результат"
            exit 1
          }

      - name: svelte-check
        working-directory: frontend
        run: npm run check -- --threshold warning

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: vitest
        working-directory: frontend
        run: npm test
